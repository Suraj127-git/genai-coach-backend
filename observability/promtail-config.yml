server:
  http_listen_port: 9080
  grpc_listen_port: 0

clients:
  - url: https://logs-prod-014.grafana.net/loki/api/v1/push
    basic_auth:
      username: 397390
      password: ${GRAFANA_LOKI_TOKEN}

positions:
  filename: /tmp/positions.yaml

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    
    relabel_configs:
      # Set the log file path
      - source_labels: ['__meta_docker_container_log_path']
        target_label: '__path__'
      
      # Container name as label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      
      # Docker Compose service name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      
      # Add compose project name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'
      
      # Container ID
      - source_labels: ['__meta_docker_container_id']
        regex: '(.{12}).*'
        target_label: 'container_id'
      
      # Image name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_image']
        target_label: 'image'
    
    # Pipeline stages to parse JSON logs
    pipeline_stages:
      - json:
          expressions:
            timestamp: t
            level: lvl
            logger: logger
            message: msg
            service: service
      
      # Set timestamp from log entry
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      
      # Extract log level
      - labels:
          level:
          service:
          logger:
      
      # Output format
      - output:
          source: message