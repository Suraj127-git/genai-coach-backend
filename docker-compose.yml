services:
  # ============================================================================
  # DATABASE LAYER
  # ============================================================================
  mysql:
    image: mysql:8.0
    container_name: genai-coach-mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - genai-coach-network
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: genai-coach-phpmyadmin
    env_file:
      - .env
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - genai-coach-network
    restart: unless-stopped

  # ============================================================================
  # STORAGE LAYER
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: genai-coach-minio
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - genai-coach-network
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: genai-coach-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      sleep 5 &&
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin} &&
      mc mb -p local/${AWS_S3_BUCKET:-genai-coach-recordings} || true &&
      mc anonymous set download local/${AWS_S3_BUCKET:-genai-coach-recordings} || true &&
      echo 'MinIO bucket initialization complete'
      "
    networks:
      - genai-coach-network

  # ============================================================================
  # APPLICATION LAYER
  # ============================================================================
  api:
    container_name: genai-coach-backend
    build:
      context: .
      dockerfile: Dockerfile
    image: genai-coach-backend:latest
    env_file:
      - .env
    environment:
      PORT: 8000
      MYSQL_HOST: mysql
      AWS_ENDPOINT_URL: http://minio:9000
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --reload --proxy-headers"]
    ports:
      - "8000:8000"
    volumes:
      - api-data:/app/data
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - genai-coach-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  genai-coach-network:
    driver: bridge

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  api-data:
  minio-data:
  mysql-data:
